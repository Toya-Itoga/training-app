<!-- Shared sidebar component. Included via: include "_sidebar.html" -->
<aside class="sidebar">
  <div class="brand">
    <div class="brand-mark">I</div>
    <div class="brand-name">IRONLOG</div>
  </div>

  <div class="nav-group-label">/ MAIN</div>

  <a class="nav-item{% if active == 'dashboard' %} active{% endif %}" href="/dashboard">
    <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
    ダッシュボード
  </a>

  <a class="nav-item{% if active == 'record' %} active{% endif %}" href="/record">
    <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4v16M3 7v10M18 4v16M21 7v10M6 12h12"/></svg>
    トレーニング記録
  </a>

  <a class="nav-item{% if active == 'history' %} active{% endif %}" href="/history">
    <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="1"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
    履歴
  </a>

  <a class="nav-item{% if active == 'exercises' %} active{% endif %}" href="/exercises">
    <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/><circle cx="2" cy="6" r="0.6" fill="currentColor"/><circle cx="2" cy="12" r="0.6" fill="currentColor"/><circle cx="2" cy="18" r="0.6" fill="currentColor"/></svg>
    種目管理
  </a>

  <div class="footer">
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
        {{ user.username | upper }}
      </div>
    </div>
    <form method="post" action="/logout" style="margin:0">
      <button class="nav-item" style="width:auto;padding:6px;border-left:0" title="ログアウト" type="submit">
        <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4H5v16h4"/><path d="M16 8l4 4-4 4M10 12h10"/></svg>
      </button>
    </form>
  </div>
</aside>
